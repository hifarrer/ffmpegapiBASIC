{% extends "base.html" %}

{% block title %}Resend Verification Email{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark text-white">
                <div class="card-header">
                    <h3>Resend Verification Email</h3>
                </div>
                <div class="card-body">
                    <p>Enter your email address to receive a new verification link.</p>
                    <form method="POST" action="{{ url_for('auth.resend_verification') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Verification Email</button>
                        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Back to Login</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
