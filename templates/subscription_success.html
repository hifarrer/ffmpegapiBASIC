<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17548478207"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-17548478207');
    </script>

    <!-- Event snippet for Purchase conversion page -->
    <script>
      gtag('event', 'conversion', {
          'send_to': 'AW-17548478207/UEmACLiqy5kbEP-N4q9B',
          'value': {{ transaction_value }},
          'currency': 'USD',
          'transaction_id': '{{ transaction_id }}'
      });
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Successful - FFMPEG API</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .success-card {
            max-width: 600px;
            width: 100%;
            margin: 20px;
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            animation: scaleIn 0.5s ease-in-out;
        }
        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        .redirect-timer {
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="card bg-dark text-white shadow-lg">
                <div class="card-body text-center p-5">
                    <div class="success-icon mb-4">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    
                    <h1 class="display-4 mb-3">Success!</h1>
                    <p class="lead mb-4">Your subscription has been activated successfully!</p>
                    
                    <div class="alert alert-success mb-4">
                        <i class="fas fa-star me-2"></i>
                        <strong>Welcome to {{ plan_name }}!</strong>
                    </div>
                    
                    <p class="mb-4">
                        Thank you for subscribing. You now have access to all premium features.
                    </p>
                    
                    <div class="d-grid gap-2 mb-3">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                            <i class="fas fa-tachometer-alt me-2"></i>Go to Dashboard
                        </a>
                        <a href="{{ url_for('api_docs') }}" class="btn btn-outline-light">
                            <i class="fas fa-book me-2"></i>View API Documentation
                        </a>
                    </div>
                    
                    <p class="redirect-timer mt-4">
                        <i class="fas fa-clock me-1"></i>
                        Redirecting to dashboard in <span id="countdown">5</span> seconds...
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-redirect after 5 seconds
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = "{{ url_for('dashboard') }}";
            }
        }, 1000);
    </script>
</body>
</html>
